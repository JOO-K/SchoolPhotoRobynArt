<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robyn Art Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Barrio&family=DotGothic16&family=Monomaniac+One&family=Jua&family=Noto+Sans+JP:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="about-panel">
      <button id="about-close">×</button>
      <p id="about-text"></p>
    </div>

    <div id="loader">
      <div id="loader-percent">0%</div>
      <div id="loader-bar-track"><div id="loader-bar-fill"></div></div>
      <p id="loader-label">Loading…</p>
    </div>

    <!-- Top left: logo + studio name + nav -->
    <div id="header">
      <img id="logo" src="/SCHOOLPHOTO - logo_full.png" alt="logo" />
      <div id="nav">
        <a class="nav-btn" href="./syllabus.html">Syllabus</a>
        <button id="about-btn">About</button>
      </div>
    </div>

    <div id="studio-info">
      <div id="studio-name-wrap">
        <div id="studio-name">Robyn Art Studio</div>
        <div class="studio-sub-line">
          <span class="studio-ko">로빈 아트 스튜디오</span>
          <span class="studio-es">Estudio de Arte Robyn</span>
          <span class="studio-ja">ロビン・アート・スタジオ</span>
        </div>
      </div>
    </div>

    <!-- Bottom left: animation buttons -->
    <div id="anim-controls"></div>

    <!-- Right side: name cards -->
    <div id="name-cards">
      <div class="name-card">Irene Hong</div>
      <div class="name-card">Matthew Baik</div>
      <div class="name-card">Mason Park</div>
      <div class="name-card">Nathaniel Kim</div>
    </div>

    <!-- Camera controls -->
    <div id="fov-control">
      <div id="hdri-row">
        <span class="ctrl-label">ENV</span>
        <div id="hdri-btns"></div>
      </div>
      <div>
        <label id="rot-label">ROT 127°</label>
        <input id="rot-slider" type="range" min="0" max="360" value="127" step="1">
      </div>
      <div>
        <label id="fov-label">FOV 94°</label>
        <input id="fov-slider" type="range" min="40" max="130" value="94" step="1">
      </div>
    </div>


    <script type="module" src="/src/main.js"></script>
  </body>
</html>
