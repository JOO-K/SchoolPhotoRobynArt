<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Robyn Art Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Barrio&family=DotGothic16&subset=latin&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <canvas id="canvas"></canvas>

    <div id="loader">
      <div class="spinner"></div>
      <p>Loading…</p>
    </div>

    <!-- Top left: logo + studio name + nav -->
    <div id="header">
      <img id="logo" src="/SCHOOLPHOTO_logo.png" alt="logo" />
      <div id="studio-name">Robyn Art Studio</div>
      <div id="nav">
        <button class="nav-btn">Syllabus</button>
        <button class="nav-btn">About</button>
      </div>
    </div>

    <!-- Bottom left: animation buttons -->
    <div id="anim-controls"></div>

    <!-- Right side: name cards -->
    <div id="name-cards">
      <div class="name-card">Irene<br>Hong</div>
      <div class="name-card">Matthew<br>Baik</div>
      <div class="name-card">Mason<br>Park</div>
      <div class="name-card">Nathaniel<br>Kim</div>
      <div class="name-card">Alexis<br>Lee</div>
    </div>

    <!-- Camera controls -->
    <div id="fov-control">
      <div>
        <label id="rot-label">ROT 127°</label>
        <input id="rot-slider" type="range" min="0" max="360" value="127" step="1">
      </div>
      <div>
        <label id="fov-label">FOV 90°</label>
        <input id="fov-slider" type="range" min="40" max="130" value="90" step="1">
      </div>
    </div>

    <!-- Bottom right: data panel -->
    <div id="data-panel"></div>
    <button id="copy-btn" onclick="navigator.clipboard.writeText(document.getElementById('data-panel').textContent)">Copy</button>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
